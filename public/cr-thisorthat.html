<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>This or That</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --rasp:#db2777; --amber:#d97706; --ink:#243530; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .half{ flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .half img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .half .ov{ position:absolute; inset:0; }
  .top .ov{ background:linear-gradient(180deg, rgba(13,148,136,.55), rgba(13,148,136,.78)); }
  .bot .ov{ background:linear-gradient(180deg, rgba(219,39,119,.78), rgba(219,39,119,.55)); }
  .half .lbl{ position:relative; z-index:2; text-align:center; color:#fff; }
  .half .lbl .e{ font-size:120px; } .half .lbl .t{ font-family:'Outfit'; font-weight:900; font-size:96px; line-height:1; letter-spacing:-2px; text-shadow:0 4px 16px rgba(0,0,0,.35); }
  .half .lbl .s{ font-family:'Outfit'; font-weight:700; font-size:38px; margin-top:8px; opacity:.95; }
  .mid{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; width:200px; height:200px; border-radius:50%;
    background:#fff; box-shadow:0 14px 40px rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; font-family:'Outfit'; font-weight:900; font-size:62px; color:var(--ink); }
  .header{ position:absolute; top:120px; left:0; right:0; z-index:6; text-align:center; color:#fff; }
  .header img{ width:96px; height:96px; border-radius:22px; box-shadow:0 10px 24px rgba(0,0,0,.4); }
  .header .q{ font-family:'Outfit'; font-weight:900; font-size:52px; margin-top:14px; text-shadow:0 3px 12px rgba(0,0,0,.4); }
  .footer{ position:absolute; bottom:60px; left:0; right:0; z-index:6; text-align:center; color:#fff; font-family:'Outfit'; font-weight:800; font-size:40px; text-shadow:0 3px 12px rgba(0,0,0,.4); }
</style></head>
<body><div class="banner">
  <div class="half top"><img src="images/shake/snikers.png" alt=""><div class="ov"></div><div class="lbl"><div class="e">🥤</div><div class="t">TEAM SMOOTHIE</div><div class="s">gourmand &amp; protéiné</div></div></div>
  <div class="half bot"><img src="images/drinks/electric-blue.png" alt=""><div class="ov"></div><div class="lbl"><div class="t">TEAM DRINK</div><div class="e">⚡</div><div class="s">frais &amp; 0 sucre</div></div></div>
  <div class="mid">VS</div>
  <div class="header"><img src="icon-512.png" alt="La Base"><div class="q">Tu es plutôt… ?</div></div>
  <div class="footer">👆 Vote en story !</div>
</div></body></html>
