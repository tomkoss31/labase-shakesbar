<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>Story Combo</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59; --amber:#d97706; --amberDeep:#b45309; --rasp:#db2777; --cream:#fbf7f0; --ink:#243530; --ink2:#5c6b66; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:radial-gradient(700px 700px at 0% 0%, rgba(217,119,6,.20), transparent 60%),
      radial-gradient(700px 700px at 100% 6%, rgba(219,39,119,.16), transparent 62%),
      radial-gradient(760px 760px at 100% 100%, rgba(13,148,136,.16), transparent 60%),
      linear-gradient(180deg,#fdfaf4 0%, var(--cream) 55%, #f6efe4 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:200px 80px 230px; }
  .logo{ width:120px; height:120px; border-radius:28px; box-shadow:0 16px 34px rgba(13,148,136,.30); }
  .wordmark{ font-family:'Outfit'; font-weight:900; font-size:44px; letter-spacing:10px; color:var(--tealDeep); margin-top:16px; }
  .kicker{ margin-top:26px; font-family:'Outfit'; font-weight:800; font-size:38px; color:var(--amberDeep); }
  .head{ font-family:'Outfit'; font-weight:900; line-height:.92; letter-spacing:-2px; margin-top:6px; }
  .head .a{ font-size:120px; color:var(--teal); } .head .b{ font-size:96px; color:var(--rasp); }
  .pill{ margin-top:24px; display:inline-flex; align-items:center; gap:12px; padding:16px 40px; border-radius:999px; background:rgba(217,119,6,.12); border:2px solid rgba(217,119,6,.30); color:var(--amberDeep); font-weight:800; font-size:38px; }
  .meds{ margin-top:54px; display:flex; align-items:center; justify-content:center; gap:-40px; }
  .med{ width:330px; height:330px; border-radius:50%; overflow:hidden; border:9px solid #fff; box-shadow:0 24px 52px rgba(20,40,36,.26); outline:5px solid rgba(13,148,136,.30); }
  .med.two{ margin-left:-70px; outline-color:rgba(219,39,119,.32); }
  .med img{ width:100%; height:100%; object-fit:cover; }
  .combos{ margin-top:56px; display:flex; flex-direction:column; gap:18px; width:100%; max-width:740px; }
  .cb{ display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.85); border:1px solid rgba(20,40,36,.08); box-shadow:0 12px 28px rgba(20,40,36,.08); border-radius:24px; padding:24px 34px; }
  .cb .n{ font-family:'Outfit'; font-weight:800; font-size:36px; color:var(--ink); text-align:center; }
  .cb .n small{ display:block; font-size:26px; color:var(--ink2); font-weight:500; margin-top:4px; }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:130px; z-index:6; background:linear-gradient(90deg,var(--tealDeep),var(--tealDark) 50%,var(--teal)); display:flex; align-items:center; justify-content:center; gap:30px; color:#eafaf6; font-weight:600; font-size:32px; padding-bottom:24px; }
  .strip b{ font-family:'Outfit'; font-weight:800; color:#fff; } .strip .sep{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); }
</style></head>
<body><div class="banner"><div class="core">
  <img class="logo" src="icon-512.png" alt="La Base" /><div class="wordmark">LA&nbsp;BASE</div>
  <div class="kicker">🍫 Le week-end gourmand</div>
  <div class="head"><div class="a">LE COMBO</div><div class="b">malin</div></div>
  <div class="pill">Boisson + smoothie = un max d'économies 💰</div>
  <div class="meds"><div class="med"><img src="images/drinks/electric-blue.png" alt=""></div><div class="med two"><img src="images/shake/snikers.png" alt=""></div></div>
  <div class="combos">
    <div class="cb"><div class="n">Combo Medium<small>smoothie + boisson Start</small></div></div>
    <div class="cb"><div class="n">Combo Power<small>smoothie + boisson Boost</small></div></div>
  </div>
</div><div class="strip"><span>📍 <b>11 rue Saint Pierre · Verdun</b></span><span class="sep"></span><span>un repas complet</span></div></div></body></html>
