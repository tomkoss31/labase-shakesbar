<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>LA BASE — Story Commande</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59; --amber:#d97706; --amberDeep:#b45309; --rasp:#db2777; --cream:#fbf7f0; --ink:#243530; --ink2:#5c6b66; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:
      radial-gradient(700px 700px at 0% 0%, rgba(13,148,136,.20), transparent 60%),
      radial-gradient(700px 700px at 100% 6%, rgba(217,119,6,.18), transparent 62%),
      radial-gradient(760px 760px at 100% 100%, rgba(219,39,119,.16), transparent 60%),
      linear-gradient(180deg,#fdfaf4 0%, var(--cream) 55%, #f6efe4 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:190px 80px 220px; }
  .logo{ width:120px; height:120px; border-radius:28px; box-shadow:0 16px 34px rgba(13,148,136,.30); }
  .wordmark{ font-family:'Outfit'; font-weight:900; font-size:44px; letter-spacing:10px; color:var(--tealDeep); margin-top:16px; }
  .head{ font-family:'Outfit'; font-weight:900; line-height:.92; letter-spacing:-2px; margin-top:18px; }
  .head .a{ font-size:104px; color:var(--teal); }
  .head .b{ font-size:104px; color:var(--rasp); }
  .pill{ margin-top:24px; display:inline-flex; align-items:center; gap:12px; padding:16px 40px; border-radius:999px;
    background:rgba(13,148,136,.10); border:2px solid rgba(13,148,136,.28); color:var(--tealDeep); font-weight:800; font-size:36px; }
  .qr{ margin-top:48px; background:#fff; padding:26px; border-radius:34px; border:1px solid #e5e7eb; box-shadow:0 22px 48px rgba(20,40,36,.18); }
  .qr img{ display:block; width:360px; height:360px; }
  .qr .cap{ margin-top:14px; font-family:'Outfit'; font-weight:800; font-size:30px; color:var(--tealDeep); }
  .perks{ margin-top:50px; display:flex; flex-direction:column; gap:20px; width:100%; max-width:760px; }
  .perk{ display:flex; align-items:center; gap:20px; background:rgba(255,255,255,.85); border:1px solid rgba(20,40,36,.08);
    box-shadow:0 12px 28px rgba(20,40,36,.08); border-radius:24px; padding:22px 30px; text-align:left; }
  .perk .e{ font-size:44px; flex:none; }
  .perk .t{ font-family:'Outfit'; font-weight:700; font-size:34px; color:var(--ink); }
  .perk .t b{ color:var(--tealDeep); font-weight:900; }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:130px; z-index:6;
    background:linear-gradient(90deg,var(--tealDeep),var(--tealDark) 50%,var(--teal));
    display:flex; align-items:center; justify-content:center; gap:30px; color:#eafaf6; font-weight:600; font-size:32px; padding-bottom:24px; }
  .strip b{ font-family:'Outfit'; font-weight:800; color:#fff; }
  .strip .sep{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); }
</style>
</head>
<body>
  <div class="banner">
    <div class="core">
      <img class="logo" src="icon-512.png" alt="La Base" />
      <div class="wordmark">LA&nbsp;BASE</div>
      <div class="head"><div class="a">COMMANDE</div><div class="b">EN LIGNE</div></div>
      <div class="pill">📲 L'appli La Base</div>
      <div class="qr"><img src="qr-carte.png" alt="QR"><div class="cap">Scanne &amp; commande</div></div>
      <div class="perks">
        <div class="perk"><span class="e">⭐</span><span class="t"><b>1 € = 10 XP</b> à chaque commande</span></div>
        <div class="perk"><span class="e">🥤</span><span class="t"><b>800 XP</b> = une boisson offerte</span></div>
        <div class="perk"><span class="e">🎁</span><span class="t">Roue cadeau <b>chaque semaine</b></span></div>
      </div>
    </div>
    <div class="strip">
      <span>🎁 <b>−10% sur ta 1ère commande</b></span><span class="sep"></span><span>📍 Verdun</span>
    </div>
  </div>
</body>
</html>
