<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>Devine la boisson</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden; background:#0b1412; }
  .photo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:blur(46px) saturate(1.25); transform:scale(1.15); }
  .shade{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(8,16,14,.45) 0%, rgba(8,16,14,.2) 40%, rgba(8,16,14,.78) 100%); }
  .core{ position:absolute; inset:0; z-index:3; display:flex; flex-direction:column; align-items:center; text-align:center; padding:200px 80px 220px; color:#fff; }
  .logo{ width:104px; height:104px; border-radius:24px; box-shadow:0 12px 28px rgba(0,0,0,.5); }
  .q{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Outfit'; font-weight:900; font-size:380px; line-height:1; color:rgba(255,255,255,.92); text-shadow:0 10px 40px rgba(0,0,0,.5); }
  .kicker{ margin-top:26px; font-family:'Outfit'; font-weight:800; font-size:40px; color:#fde68a; letter-spacing:1px; text-shadow:0 2px 10px rgba(0,0,0,.5); }
  .head{ margin-top:6px; font-family:'Outfit'; font-weight:900; font-size:96px; line-height:.95; letter-spacing:-2px; text-shadow:0 4px 18px rgba(0,0,0,.55); }
  .spacer{ flex:1; }
  .note{ font-family:'Outfit'; font-weight:800; font-size:44px; color:#fff; background:rgba(255,255,255,.16); border:2px solid rgba(255,255,255,.4); border-radius:999px; padding:18px 44px; }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:120px; z-index:4; background:linear-gradient(90deg,#0f766e,#0d9488); display:flex; align-items:center; justify-content:center; color:#eafaf6; font-weight:600; font-size:30px; }
  .strip b{ font-family:'Outfit'; font-weight:800; color:#fff; }
</style></head>
<body><div class="banner">
  <img class="photo" src="images/drinks/electric-blue.png" alt="">
  <div class="shade"></div>
  <div class="q">?</div>
  <div class="core">
    <img class="logo" src="icon-512.png" alt="La Base" />
    <div class="kicker">👀 DEVINE LA BOISSON</div>
    <div class="head">C'est<br>laquelle ?</div>
    <div class="spacer"></div>
    <div class="note">Réponds en story 👇</div>
  </div>
  <div class="strip"><span>📍 <b>La Base · Verdun</b> · réponse demain !</span></div>
</div></body></html>
