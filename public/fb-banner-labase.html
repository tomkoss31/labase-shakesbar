<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>LA BASE — Bannière Facebook</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59;
    --amber:#d97706; --amberDeep:#b45309; --rasp:#db2777;
    --cream:#fbf7f0; --ink:#243530; --ink2:#5c6b66;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1640px; height:624px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden;
    -webkit-print-color-adjust:exact; print-color-adjust:exact; }

  .banner{ width:1640px; height:624px; position:relative; overflow:hidden;
    background:
      radial-gradient(720px 540px at 8% -8%, rgba(13,148,136,.20), transparent 60%),
      radial-gradient(680px 560px at 96% 2%, rgba(217,119,6,.18), transparent 62%),
      radial-gradient(760px 620px at 82% 118%, rgba(219,39,119,.16), transparent 60%),
      radial-gradient(640px 540px at 18% 120%, rgba(13,148,136,.12), transparent 60%),
      linear-gradient(180deg,#fdfaf4 0%, var(--cream) 60%, #f6efe4 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(17,94,89,.05) 1px, transparent 1px);
    background-size:22px 22px; opacity:.5; }

  /* ---- décor latéral : vrais produits + anneaux + fruits ---- */
  .decor{ position:absolute; inset:0; z-index:1; }
  .ring{ position:absolute; border-radius:50%; border:2px dashed rgba(17,94,89,.18); }
  .med{ position:absolute; border-radius:50%; overflow:hidden; border:5px solid #fff;
    box-shadow:0 18px 40px rgba(20,40,36,.22); outline:3px solid rgba(13,148,136,.30); }
  .med.amber{ outline-color:rgba(217,119,6,.38); }
  .med.rasp{ outline-color:rgba(219,39,119,.38); }
  .med img{ width:100%; height:100%; object-fit:cover; display:block; }
  .fruit{ position:absolute; font-size:54px; line-height:1; filter:drop-shadow(0 8px 14px rgba(20,40,36,.22)); }

  /* ---- zone centrale (safe) ---- */
  .core{ position:absolute; inset:0 0 72px; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .logo{ width:96px; height:96px; border-radius:23px; box-shadow:0 12px 26px rgba(13,148,136,.30); }
  .wordmark{ font-family:'Outfit',sans-serif; font-weight:900; font-size:40px; letter-spacing:8px;
    color:var(--tealDeep); margin-top:12px; }

  .title{ font-family:'Outfit',sans-serif; font-weight:900; line-height:.9; letter-spacing:-2px; margin-top:8px; }
  .title .l1{ font-size:78px; color:var(--teal); }
  .title .l2{ font-size:78px; color:var(--rasp); }
  .title .amp{ color:var(--ink); opacity:.5; }

  .pill{ margin-top:18px; display:inline-flex; align-items:center; gap:9px;
    padding:11px 26px; border-radius:999px; background:rgba(13,148,136,.10);
    border:1.5px solid rgba(13,148,136,.28); color:var(--tealDeep); font-weight:700; font-size:23px; }

  .pillars{ margin-top:24px; display:flex; gap:18px; }
  .pillar{ display:flex; align-items:center; gap:14px; background:rgba(255,255,255,.82);
    border:1px solid rgba(20,40,36,.08); box-shadow:0 10px 26px rgba(20,40,36,.08);
    border-radius:18px; padding:13px 22px; white-space:nowrap; }
  .pillar .ico{ width:46px; height:46px; border-radius:13px; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:24px; background:rgba(13,148,136,.12); }
  .pillar.smoothie .ico{ background:rgba(219,39,119,.13); }
  .pillar .tx{ display:flex; flex-direction:column; line-height:1.15; text-align:left; }
  .pillar .tx .h{ font-family:'Outfit',sans-serif; font-weight:800; font-size:21px; color:var(--ink); }
  .pillar .tx .s{ font-size:16px; font-weight:500; color:var(--ink2); margin-top:2px; }

  .slogan{ margin-top:22px; font-family:'Outfit',sans-serif; font-weight:700; font-size:27px; color:var(--tealDeep); }
  .slogan em{ font-style:normal; color:var(--amber); }

  /* ---- bandeau bas ---- */
  .strip{ position:absolute; left:0; right:0; bottom:0; height:72px; z-index:6;
    background:linear-gradient(90deg,var(--tealDeep),var(--tealDark) 50%,var(--teal));
    display:flex; align-items:center; justify-content:center; gap:34px;
    color:#eafaf6; font-weight:600; font-size:23px; box-shadow:0 -8px 24px rgba(13,148,136,.25); }
  .strip .item{ display:inline-flex; align-items:center; gap:11px; white-space:nowrap; }
  .strip .sep{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.45); }
  .strip b{ font-family:'Outfit',sans-serif; font-weight:800; color:#fff; }
</style>
</head>
<body>
  <div class="banner">

    <!-- DÉCOR : vraies photos produits + anneaux pointillés + fruits -->
    <div class="decor">
      <!-- gauche -->
      <div class="ring" style="left:-44px; top:66px; width:300px; height:300px;"></div>
      <div class="med" style="left:34px; top:60px; width:150px; height:150px;"><img src="images/drinks/electric-blue.png" alt=""></div>
      <div class="med rasp" style="left:8px; top:300px; width:120px; height:120px;"><img src="images/shake/snikers.png" alt=""></div>
      <div class="fruit" style="left:6px; top:214px;">🍓</div>
      <div class="fruit" style="left:150px; top:88px;">🥝</div>
      <div class="fruit" style="left:40px; top:440px;">🫐</div>

      <!-- droite -->
      <div class="ring" style="right:-44px; top:60px; width:310px; height:310px;"></div>
      <div class="med amber" style="right:28px; top:54px; width:156px; height:156px;"><img src="images/drinks/aurora.png" alt=""></div>
      <div class="med" style="right:6px; top:300px; width:120px; height:120px;"><img src="images/drinks/black-panther.png" alt=""></div>
      <div class="fruit" style="right:6px; top:212px;">🥭</div>
      <div class="fruit" style="right:150px; top:86px;">🍋‍🟩</div>
      <div class="fruit" style="right:40px; top:440px;">🍒</div>
    </div>

    <!-- ZONE CENTRALE -->
    <div class="core">
      <img class="logo" src="icon-512.png" alt="La Base" />
      <div class="wordmark">LA&nbsp;BASE</div>

      <h1 class="title"><div class="l1">SHAKES</div><div class="l2"><span class="amp">&amp;</span> DRINKS</div></h1>

      <div class="pill">🌿 Ton spot healthy à Verdun</div>

      <div class="pillars">
        <div class="pillar energy">
          <div class="ico">⚡</div>
          <div class="tx"><span class="h">Boissons énergisantes</span><span class="s">0 sucre · vitaminées</span></div>
        </div>
        <div class="pillar smoothie">
          <div class="ico">🥤</div>
          <div class="tx"><span class="h">Smoothies gourmands</span><span class="s">vitaminés &amp; protéinés</span></div>
        </div>
      </div>

      <div class="slogan">Fais le plein de bienfaits, <em>chaque jour&nbsp;!</em></div>
    </div>

    <!-- BANDEAU BAS -->
    <div class="strip">
      <span class="item">📍 <b>11 rue Saint Pierre</b></span><span class="sep"></span>
      <span class="item">📲 Commande en ligne</span><span class="sep"></span>
      <span class="item">🎁 Fidélité &amp; cadeaux</span>
    </div>

  </div>
</body>
</html>
