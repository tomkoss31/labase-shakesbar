<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>LA BASE — Post Roue concours</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59; --amber:#d97706; --amberDeep:#b45309; --rasp:#db2777; --cream:#fbf7f0; --ink:#243530; --ink2:#5c6b66; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1080px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(560px 560px at 0% 0%, rgba(217,119,6,.20), transparent 60%),
      radial-gradient(560px 560px at 100% 0%, rgba(219,39,119,.16), transparent 62%),
      radial-gradient(620px 620px at 100% 100%, rgba(13,148,136,.16), transparent 60%),
      linear-gradient(180deg,#fdfaf4 0%, var(--cream) 55%, #f6efe4 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:28px 28px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:60px 70px 120px; }
  .top{ display:flex; align-items:center; gap:16px; }
  .top img{ width:74px; height:74px; border-radius:18px; box-shadow:0 8px 18px rgba(13,148,136,.30); }
  .top .nm{ font-family:'Outfit'; font-weight:900; font-size:38px; letter-spacing:5px; color:var(--tealDeep); }
  .kicker{ margin-top:26px; font-family:'Outfit'; font-weight:800; font-size:34px; color:var(--amberDeep); }
  .head{ font-family:'Outfit'; font-weight:900; line-height:.9; letter-spacing:-2px; margin-top:6px; }
  .head .a{ font-size:104px; color:var(--rasp); }
  .layout{ margin-top:30px; display:flex; align-items:center; gap:44px; }
  .wheel{ width:300px; height:300px; border-radius:50%; position:relative; flex:none;
    background:conic-gradient(var(--teal) 0 60deg,#fbbf24 60deg 120deg,var(--rasp) 120deg 180deg,#22d3ee 180deg 240deg,var(--amber) 240deg 300deg,#a855f7 300deg 360deg);
    box-shadow:0 20px 46px rgba(20,40,36,.28), inset 0 0 0 11px #fff; display:flex; align-items:center; justify-content:center; }
  .wheel .hub{ width:96px; height:96px; border-radius:50%; background:#fff; box-shadow:0 6px 16px rgba(0,0,0,.18); display:flex; align-items:center; justify-content:center; font-size:54px; }
  .wheel .pin{ position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:18px solid transparent; border-right:18px solid transparent; border-top:30px solid var(--ink); }
  .prizes{ display:flex; flex-direction:column; gap:14px; text-align:left; }
  .pz{ font-family:'Outfit'; font-weight:800; font-size:32px; color:var(--ink); display:flex; align-items:center; gap:14px; }
  .pz .d{ width:16px; height:16px; border-radius:50%; flex:none; }
  .steps{ margin-top:40px; font-size:30px; color:var(--ink2); font-weight:500; }
  .steps b{ color:var(--ink); font-family:'Outfit'; font-weight:800; }
  .cta{ margin-top:30px; font-family:'Outfit'; font-weight:900; font-size:42px; color:#fff;
    background:linear-gradient(90deg,var(--amber),var(--amberDeep)); padding:20px 48px; border-radius:999px; box-shadow:0 16px 36px rgba(217,119,6,.32); }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:96px; z-index:6;
    background:linear-gradient(90deg,var(--tealDeep),var(--tealDark) 50%,var(--teal));
    display:flex; align-items:center; justify-content:center; gap:28px; color:#eafaf6; font-weight:600; font-size:30px; }
  .strip b{ font-family:'Outfit'; font-weight:800; color:#fff; }
  .strip .sep{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); }
</style>
</head>
<body>
  <div class="banner">
    <div class="core">
      <div class="top"><img src="icon-512.png" alt="La Base"><span class="nm">LA&nbsp;BASE</span></div>
      <div class="kicker">🎡 La roue cadeau</div>
      <div class="head"><div class="a">TENTE TA CHANCE</div></div>

      <div class="layout">
        <div class="wheel"><div class="pin"></div><div class="hub">🎁</div></div>
        <div class="prizes">
          <div class="pz"><span class="d" style="background:#0d9488"></span>−5% / −10% / −15%</div>
          <div class="pz"><span class="d" style="background:#db2777"></span>2e smoothie offert</div>
          <div class="pz"><span class="d" style="background:#d97706"></span>Gaufre healthy offerte</div>
          <div class="pz"><span class="d" style="background:#a855f7"></span>Cadeaux surprise</div>
        </div>
      </div>

      <div class="steps">📲 <b>1 tour gratuit chaque semaine</b> dans l'appli La Base</div>
      <div class="cta">Joue &amp; gagne 🎉</div>
    </div>
    <div class="strip">
      <span>📍 <b>11 rue Saint Pierre · Verdun</b></span><span class="sep"></span><span>commande.labase-nutrition.com</span>
    </div>
  </div>
</body>
</html>
