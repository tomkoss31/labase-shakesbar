<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>LA BASE — Story Roue</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59; --amber:#d97706; --amberDeep:#b45309; --rasp:#db2777; --cream:#fbf7f0; --ink:#243530; --ink2:#5c6b66; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:
      radial-gradient(700px 700px at 0% 0%, rgba(217,119,6,.20), transparent 60%),
      radial-gradient(700px 700px at 100% 6%, rgba(219,39,119,.16), transparent 62%),
      radial-gradient(760px 760px at 100% 100%, rgba(13,148,136,.16), transparent 60%),
      linear-gradient(180deg,#fdfaf4 0%, var(--cream) 55%, #f6efe4 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:190px 80px 220px; }
  .logo{ width:120px; height:120px; border-radius:28px; box-shadow:0 16px 34px rgba(13,148,136,.30); }
  .wordmark{ font-family:'Outfit'; font-weight:900; font-size:44px; letter-spacing:10px; color:var(--tealDeep); margin-top:16px; }
  .kicker{ margin-top:26px; font-family:'Outfit'; font-weight:800; font-size:40px; color:var(--amberDeep); }
  .head{ font-family:'Outfit'; font-weight:900; line-height:.9; letter-spacing:-2px; margin-top:6px; }
  .head .a{ font-size:118px; color:var(--rasp); }
  .head .b{ font-size:64px; color:var(--ink); }
  .wheel{ width:340px; height:340px; border-radius:50%; margin-top:30px; position:relative; flex:none;
    background:conic-gradient(var(--teal) 0 60deg,#fbbf24 60deg 120deg,var(--rasp) 120deg 180deg,#22d3ee 180deg 240deg,var(--amber) 240deg 300deg,#a855f7 300deg 360deg);
    box-shadow:0 22px 50px rgba(20,40,36,.28), inset 0 0 0 12px #fff; display:flex; align-items:center; justify-content:center; }
  .wheel .hub{ width:108px; height:108px; border-radius:50%; background:#fff; box-shadow:0 6px 16px rgba(0,0,0,.18);
    display:flex; align-items:center; justify-content:center; font-size:60px; }
  .wheel .pin{ position:absolute; top:-14px; left:50%; transform:translateX(-50%); width:0; height:0;
    border-left:20px solid transparent; border-right:20px solid transparent; border-top:34px solid var(--ink); }
  .prizes{ margin-top:48px; display:flex; flex-wrap:wrap; gap:16px; justify-content:center; max-width:820px; }
  .pz{ font-family:'Outfit'; font-weight:800; font-size:32px; color:var(--tealDeep);
    background:rgba(13,148,136,.10); border:1.5px solid rgba(13,148,136,.28); border-radius:999px; padding:14px 30px; }
  .pz.amber{ color:var(--amberDeep); background:rgba(217,119,6,.10); border-color:rgba(217,119,6,.28); }
  .pz.rasp{ color:var(--rasp); background:rgba(219,39,119,.10); border-color:rgba(219,39,119,.28); }
  .cta{ margin-top:50px; font-family:'Outfit'; font-weight:900; font-size:46px; color:#fff;
    background:linear-gradient(90deg,var(--amber),var(--amberDeep)); padding:22px 54px; border-radius:999px; box-shadow:0 16px 36px rgba(217,119,6,.32); }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:130px; z-index:6;
    background:linear-gradient(90deg,var(--tealDeep),var(--tealDark) 50%,var(--teal));
    display:flex; align-items:center; justify-content:center; gap:30px; color:#eafaf6; font-weight:600; font-size:32px; padding-bottom:24px; }
  .strip b{ font-family:'Outfit'; font-weight:800; color:#fff; }
  .strip .sep{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); }
</style>
</head>
<body>
  <div class="banner">
    <div class="core">
      <img class="logo" src="icon-512.png" alt="La Base" />
      <div class="wordmark">LA&nbsp;BASE</div>
      <div class="kicker">🎡 Roue cadeau chaque semaine</div>
      <div class="head"><div class="a">TENTE</div><div class="b">ta chance !</div></div>
      <div class="wheel"><div class="pin"></div><div class="hub">🎁</div></div>
      <div class="prizes">
        <span class="pz">−10% offerts</span>
        <span class="pz amber">Gaufre offerte</span>
        <span class="pz rasp">2e smoothie offert</span>
        <span class="pz">Cadeaux surprise</span>
      </div>
      <div class="cta">Joue dans l'appli 📲</div>
    </div>
    <div class="strip">
      <span>📍 <b>11 rue Saint Pierre · Verdun</b></span><span class="sep"></span><span>1 tour / semaine</span>
    </div>
  </div>
</body>
</html>
