<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>M&M's</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden; background:#0b1412; }
  .photo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .shade{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(8,16,14,.55) 0%, rgba(8,16,14,0) 26%, rgba(8,16,14,0) 44%, rgba(8,16,14,.72) 72%, rgba(8,16,14,.94) 100%); }
  .top{ position:absolute; top:150px; left:0; right:0; z-index:3; display:flex; flex-direction:column; align-items:center; }
  .top img{ width:96px; height:96px; border-radius:22px; box-shadow:0 10px 24px rgba(0,0,0,.45); }
  .top .nm{ font-family:'Outfit'; font-weight:900; font-size:40px; letter-spacing:9px; color:#fff; margin-top:12px; text-shadow:0 2px 10px rgba(0,0,0,.5); }
  .tag{ margin-top:14px; font-family:'Outfit'; font-weight:800; font-size:30px; color:#fff; background:linear-gradient(90deg,#dc2626,#f59e0b); padding:10px 28px; border-radius:999px; box-shadow:0 6px 16px rgba(220,38,38,.4); }
  .bottom{ position:absolute; left:0; right:0; bottom:150px; z-index:3; text-align:center; padding:0 80px; color:#fff; }
  .kick{ font-family:'Outfit'; font-weight:800; font-size:34px; color:#fde68a; letter-spacing:1px; }
  .h{ font-family:'Outfit'; font-weight:900; font-size:140px; line-height:.95; letter-spacing:-2px; margin-top:8px; text-shadow:0 4px 18px rgba(0,0,0,.55); }
  .d{ font-size:36px; color:#e9f6f2; margin-top:16px; font-weight:500; }
  .price{ display:inline-block; margin-top:22px; font-family:'Outfit'; font-weight:900; font-size:44px; color:#04100f; background:linear-gradient(90deg,#fbbf24,#f59e0b); padding:14px 40px; border-radius:999px; box-shadow:0 14px 30px rgba(0,0,0,.4); }
</style></head>
<body><div class="banner">
  <img class="photo" src="images/shake/m&m.png" alt="">
  <div class="shade"></div>
  <div class="top"><img src="icon-512.png" alt="La Base"><div class="nm">LA&nbsp;BASE</div><div class="tag">🏆 Le best-seller</div></div>
  <div class="bottom">
    <div class="kick">24g PROTÉINES · GOURMAND</div>
    <div class="h">M&amp;M's</div>
    <div class="d">chocolat · caramel · noisette · topping M&amp;M's</div>
    <div class="price">650 ml · 8,90 €</div>
  </div>
</div></body></html>
