<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>Cookies VS Snickers</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --rasp:#db2777; --amber:#d97706; --ink:#243530; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .half{ flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .half img.bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .half .ov{ position:absolute; inset:0; }
  .top .ov{ background:linear-gradient(180deg, rgba(160,82,45,.55), rgba(124,45,18,.78)); }
  .bot .ov{ background:linear-gradient(180deg, rgba(146,64,14,.78), rgba(120,53,15,.55)); }
  .half .lbl{ position:relative; z-index:2; text-align:center; color:#fff; }
  .half .lbl .t{ font-family:'Outfit'; font-weight:900; font-size:124px; line-height:1; letter-spacing:-2px; text-shadow:0 4px 16px rgba(0,0,0,.45); }
  .half .lbl .e{ font-size:96px; margin-top:6px; } .half .lbl .s{ font-family:'Outfit'; font-weight:700; font-size:36px; margin-top:6px; opacity:.95; }
  .mid{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; width:200px; height:200px; border-radius:50%;
    background:#fff; box-shadow:0 14px 40px rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; font-family:'Outfit'; font-weight:900; font-size:62px; color:var(--ink); }
  .header{ position:absolute; top:100px; left:0; right:0; z-index:6; text-align:center; color:#fff; }
  .header img{ width:96px; height:96px; border-radius:22px; box-shadow:0 10px 24px rgba(0,0,0,.4); }
  .header .q{ font-family:'Outfit'; font-weight:900; font-size:54px; margin-top:14px; text-shadow:0 3px 12px rgba(0,0,0,.5); }
  .footer{ position:absolute; bottom:60px; left:0; right:0; z-index:6; text-align:center; color:#fff; font-family:'Outfit'; font-weight:800; font-size:38px; text-shadow:0 3px 12px rgba(0,0,0,.5); }
</style></head>
<body><div class="banner">
  <div class="half top"><img class="bg" src="images/shake/cookies-cream.png" alt=""><div class="ov"></div><div class="lbl"><div class="e">🍪</div><div class="t">TEAM COOKIES</div><div class="s">cookies cream · choco blanc</div></div></div>
  <div class="half bot"><img class="bg" src="images/shake/snikers.png" alt=""><div class="ov"></div><div class="lbl"><div class="t">TEAM SNICKERS</div><div class="e">🥜</div><div class="s">chocolat · cacahuètes</div></div></div>
  <div class="mid">VS</div>
  <div class="header"><img src="icon-512.png" alt="La Base"><div class="q">Tu choisis quoi ?</div></div>
  <div class="footer">👆 Vote en story !</div>
</div></body></html>
