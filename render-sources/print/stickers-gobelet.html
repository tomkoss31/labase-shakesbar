<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stickers gobelet — La Base</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @page { size: A4 landscape; margin: 0; }
  html, body { width: 297mm; height: 210mm; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #ecfdf5;
    background: linear-gradient(150deg, #061a17 0%, #02100e 100%);
    -webkit-print-color-adjust: exact; print-color-adjust: exact; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10mm; padding: 14mm; }

  .title { text-align: center; }
  .title h1 { font-family: 'Outfit'; font-weight: 900; font-size: 8mm; }
  .title p { font-size: 3.6mm; color: #9fc0ba; margin-top: 1.5mm; }

  .row { display: flex; align-items: center; justify-content: center; gap: 24mm; }
  .item { text-align: center; }
  .item .lbl { margin-top: 5mm; font-family: 'Outfit'; font-weight: 800; font-size: 4mm; color: #5eead4; }
  .item .dim { font-size: 3mm; color: #9fc0ba; margin-top: 1mm; }

  /* ── Sticker LOGO (rond) ── */
  .logo {
    width: 78mm; height: 78mm; border-radius: 50%; position: relative;
    background: radial-gradient(120% 120% at 50% 30%, #0c2521 0%, #04100f 70%);
    border: 1.4mm solid transparent; background-clip: padding-box;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 9mm 6mm 13mm; box-shadow: 0 6mm 16mm rgba(0,0,0,.5);
  }
  .logo::before { content: ''; position: absolute; inset: -1.4mm; border-radius: 50%; z-index: -1;
    background: linear-gradient(135deg, #5eead4, #14b8a6, #f59e0b); }
  .logo img { width: 38mm; height: 38mm; border-radius: 8.5mm; box-shadow: 0 3mm 7mm rgba(0,0,0,.55); }
  .logo .txt { text-align: center; }
  .logo .nm { font-family: 'Outfit'; font-weight: 900; font-size: 9mm; line-height: 1; letter-spacing: -.01em; }
  .logo .tg { font-size: 2.7mm; letter-spacing: .3em; color: #5eead4; font-weight: 700; margin-top: 1.6mm; }
  .logo .vd { font-family: 'Outfit'; font-weight: 700; font-size: 2.9mm; color: #9fc0ba; margin-top: 2.6mm; letter-spacing: .14em; }

  /* ── Sticker QR (rond) ── */
  .qrs {
    width: 78mm; height: 78mm; border-radius: 50%; position: relative; overflow: hidden;
    background: linear-gradient(160deg, #0c2521, #04100f);
    border: 1.4mm solid transparent; background-clip: padding-box;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 7mm;
    box-shadow: 0 6mm 16mm rgba(0,0,0,.5);
  }
  .qrs::before { content: ''; position: absolute; inset: -1.4mm; border-radius: 50%; z-index: -1;
    background: linear-gradient(135deg, #fbbf24, #f59e0b, #5eead4); }
  .qrs .top { font-family: 'Outfit'; font-weight: 900; font-size: 4.4mm; color: #fbbf24; text-transform: uppercase; letter-spacing: .04em; }
  .qrs .qr { background: #fff; padding: 2.2mm; border-radius: 3mm; margin: 2.4mm 0; box-shadow: 0 2mm 6mm rgba(0,0,0,.4); }
  .qrs .qr img { display: block; width: 33mm; height: 33mm; }
  .qrs .bot { font-family: 'Outfit'; font-weight: 800; font-size: 3.5mm; }
  .qrs .bot .ac { color: #5eead4; }
  .qrs .ig { font-size: 2.6mm; color: #9fc0ba; margin-top: .8mm; }
</style>
</head>
<body>
  <div class="title">
    <h1>🥤 Stickers gobelet</h1>
    <p>À imprimer en rond (autocollant) — versions de travail, on ajuste avant prod</p>
  </div>

  <div class="row">
    <div class="item">
      <div class="logo">
        <img src="icon-512.png" alt="La Base" />
        <div class="txt">
          <div class="nm">LA BASE</div>
          <div class="tg">SHAKES &amp; DRINKS</div>
          <div class="vd">★ VERDUN ★</div>
        </div>
      </div>
      <div class="lbl">Sticker LOGO</div>
      <div class="dim">rond · ~ 6 cm</div>
    </div>

    <div class="item">
      <div class="qrs">
        <div class="top">🎰 Scanne &amp; gagne</div>
        <div class="qr"><img src="qr-jeu.png" alt="QR jeu concours" /></div>
        <div class="bot"><span class="ac">100% gagnant</span> 🎁</div>
        <div class="ig">@labase_verdun</div>
      </div>
      <div class="lbl">Sticker QR — jeu concours</div>
      <div class="dim">rond · ~ 6 cm · lien /jeu</div>
    </div>
  </div>
</body>
</html>
