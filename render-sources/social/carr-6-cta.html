<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>Carr 6 cta</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1350px; }
  body{ font-family:'Inter',sans-serif; color:#fff; overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .c{ width:1080px; height:1350px; position:relative; overflow:hidden;
    background:
      radial-gradient(640px 640px at 18% 18%, rgba(246,146,30,.26), transparent 60%),
      radial-gradient(640px 640px at 84% 22%, rgba(138,63,240,.24), transparent 60%),
      radial-gradient(680px 680px at 50% 92%, rgba(43,140,255,.26), transparent 60%),
      linear-gradient(160deg,#0c2a26 0%, #08191c 55%, #061417 100%); }
  .c::before{ content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.05) 1.3px, transparent 1.3px); background-size:32px 32px; opacity:.45; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:110px 90px; }
  .logo{ width:120px; height:120px; border-radius:28px; box-shadow:0 16px 40px rgba(0,0,0,.5); }
  .wm{ font-family:'Outfit'; font-weight:900; font-size:46px; letter-spacing:11px; margin-top:18px; color:#eafaf6; }
  .head{ font-family:'Outfit'; font-weight:900; font-size:96px; line-height:.96; letter-spacing:-2px; margin-top:54px; }
  .head em{ font-style:normal; background:linear-gradient(90deg,#f6921e,#E0218A 55%,#4aa3ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:42px; color:#bcd6cf; margin-top:30px; font-weight:500; }
  .cta{ margin-top:64px; font-family:'Outfit'; font-weight:900; font-size:46px; color:#06211d;
    background:#eafaf6; padding:28px 64px; border-radius:999px; box-shadow:0 18px 40px rgba(0,0,0,.4); }
  .loc{ margin-top:46px; font-size:38px; color:#dfeee9; font-weight:600; }
</style></head>
<body><div class="c"><div class="core">
  <img class="logo" src="icon-512.png" alt="La Base" /><div class="wm">LA&nbsp;BASE</div>
  <div class="head">ET TOI,<br>c'est lequel<br>ton <em>préféré ?</em></div>
  <div class="sub">Dis-le nous en commentaire 👇</div>
  <div class="cta">📲 Commande en ligne</div>
  <div class="loc">📍 11 rue Saint Pierre, Verdun</div>
</div></div></body></html>
