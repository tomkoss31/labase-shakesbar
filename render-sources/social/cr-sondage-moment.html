<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>Sondage moment</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59; --amber:#d97706; --rasp:#db2777; --cream:#fbf7f0; --ink:#243530; --ink2:#5c6b66; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:radial-gradient(700px 700px at 0% 0%, rgba(217,119,6,.18), transparent 60%),
      radial-gradient(700px 700px at 100% 100%, rgba(13,148,136,.18), transparent 60%),
      linear-gradient(180deg,#fdfaf4 0%, var(--cream) 55%, #f6efe4 100%); }
  .banner::before{ content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:210px 90px 220px; }
  .logo{ width:112px; height:112px; border-radius:26px; box-shadow:0 14px 30px rgba(13,148,136,.30); }
  .kicker{ margin-top:24px; font-family:'Outfit'; font-weight:800; font-size:38px; color:var(--amber); letter-spacing:1px; }
  .q{ margin-top:10px; font-family:'Outfit'; font-weight:900; font-size:80px; line-height:1; color:var(--ink); }
  .opts{ margin-top:60px; display:flex; flex-direction:column; gap:26px; width:100%; max-width:780px; }
  .o{ display:flex; align-items:center; gap:26px; background:rgba(255,255,255,.88); border:1px solid rgba(20,40,36,.08); box-shadow:0 14px 32px rgba(20,40,36,.08); border-radius:28px; padding:30px 40px; }
  .o .e{ font-size:64px; flex:none; } .o .t{ font-family:'Outfit'; font-weight:800; font-size:46px; color:var(--ink); text-align:left; }
  .note{ margin-top:54px; font-family:'Outfit'; font-weight:800; font-size:40px; color:var(--tealDeep); }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:120px; z-index:6; background:linear-gradient(90deg,var(--tealDeep),var(--tealDark) 50%,var(--teal)); display:flex; align-items:center; justify-content:center; color:#eafaf6; font-weight:600; font-size:30px; }
  .strip b{ font-family:'Outfit'; font-weight:800; color:#fff; }
</style></head>
<body><div class="banner"><div class="core">
  <img class="logo" src="icon-512.png" alt="La Base" />
  <div class="kicker">🗳️ DIS-NOUS TOUT</div>
  <div class="q">C'est quoi ton<br>moment La Base ?</div>
  <div class="opts">
    <div class="o"><span class="e">☀️</span><span class="t">Le matin, en énergie</span></div>
    <div class="o"><span class="e">💪</span><span class="t">Après le sport, en récup</span></div>
    <div class="o"><span class="e">😌</span><span class="t">La pause gourmande</span></div>
  </div>
  <div class="note">👆 Réponds au sondage !</div>
</div><div class="strip"><span>📍 <b>La Base · 11 rue Saint Pierre · Verdun</b></span></div></div></body></html>
