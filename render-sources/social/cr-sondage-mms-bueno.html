<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>M&M's VS Bueno</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDark:#0f766e; --tealDeep:#115e59; --amber:#d97706; --rasp:#db2777; --ink:#243530; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:#fff; overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:radial-gradient(720px 720px at 0% 0%, rgba(220,38,38,.32), transparent 60%),
      radial-gradient(720px 720px at 100% 100%, rgba(120,53,15,.40), transparent 60%),
      linear-gradient(180deg,#1a0e08 0%, #2a1610 55%, #1a0e08 100%); }
  .header{ position:absolute; top:130px; left:0; right:0; z-index:6; text-align:center; }
  .header img{ width:104px; height:104px; border-radius:24px; box-shadow:0 12px 28px rgba(0,0,0,.5); }
  .kicker{ margin-top:18px; font-family:'Outfit'; font-weight:800; font-size:34px; color:#fde68a; letter-spacing:1px; }
  .h1{ font-family:'Outfit'; font-weight:900; font-size:78px; line-height:1; letter-spacing:-2px; margin-top:8px; text-shadow:0 4px 16px rgba(0,0,0,.5); }
  .h1 .ac{ color:#fbbf24; }
  .versus{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; display:flex; align-items:center; gap:20px; }
  .card{ width:380px; display:flex; flex-direction:column; align-items:center; }
  .card .ph{ width:340px; height:340px; border-radius:50%; overflow:hidden; border:8px solid #fff; box-shadow:0 24px 56px rgba(0,0,0,.55); }
  .card.a .ph{ outline:5px solid #dc2626; } .card.b .ph{ outline:5px solid #a16207; }
  .card .ph img{ width:100%; height:100%; object-fit:cover; }
  .card .tag{ margin-top:14px; font-family:'Outfit'; font-weight:900; font-size:40px; padding:8px 26px; border-radius:999px; }
  .card.a .tag{ background:#dc2626; color:#fff; } .card.b .tag{ background:#a16207; color:#fff; }
  .card .name{ font-family:'Outfit'; font-weight:900; font-size:54px; margin-top:14px; text-shadow:0 4px 14px rgba(0,0,0,.55); }
  .card .stat{ font-family:'Outfit'; font-weight:800; font-size:30px; margin-top:6px; color:#fde68a; }
  .vs{ width:130px; height:130px; border-radius:50%; background:#fff; color:var(--ink); display:flex; align-items:center; justify-content:center; font-family:'Outfit'; font-weight:900; font-size:54px; box-shadow:0 14px 40px rgba(0,0,0,.5); }
  .hook{ position:absolute; bottom:180px; left:0; right:0; z-index:6; text-align:center; padding:0 70px; }
  .hook .q{ font-family:'Outfit'; font-weight:900; font-size:48px; line-height:1.15; text-shadow:0 4px 14px rgba(0,0,0,.5); }
  .hook .q .ac{ color:#fbbf24; }
  .footer{ position:absolute; bottom:60px; left:0; right:0; z-index:6; text-align:center; font-family:'Outfit'; font-weight:800; font-size:36px; opacity:.9; }
</style></head>
<body><div class="banner">
  <div class="header">
    <img src="icon-512.png" alt="La Base">
    <div class="kicker">🏆 LE DUEL DES BEST-SELLERS</div>
    <div class="h1">M&amp;M's <span class="ac">VS</span> BUENO</div>
  </div>
  <div class="versus">
    <div class="card a"><div class="ph"><img src="images/shake/m&m.png" alt=""></div><div class="tag">M&amp;M's</div><div class="stat">🥇 le best-seller</div></div>
    <div class="vs">VS</div>
    <div class="card b"><div class="ph"><img src="images/shake/bueno.png" alt=""></div><div class="tag">BUENO</div><div class="stat">✨ le challenger</div></div>
  </div>
  <div class="hook"><div class="q">M&amp;M's est clairement notre best-seller<br>mais <span class="ac">Bueno n'est pas loin</span> 👀<br>Toi c'est quoi ton préféré ?</div></div>
  <div class="footer">👆 Vote en story !</div>
</div></body></html>
