<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><title>T4 Journée spéciale</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* >>> COULEUR DU JOUR : change --theme et --theme2 selon la journée (ex Halloween orange, St-Valentin rose) <<< */
  :root{ --theme:#16a34a; --theme2:#0d9488; --ink:#173a30; --ink2:#5c7068; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:radial-gradient(800px 800px at 50% -10%, color-mix(in srgb, var(--theme) 22%, transparent), transparent 60%),
      radial-gradient(700px 700px at 100% 100%, color-mix(in srgb, var(--theme2) 20%, transparent), transparent 60%),
      linear-gradient(180deg,#fffdf8 0%, #fbf7f0 60%, #f4efe6 100%); }
  .banner::before{ content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:210px 80px 230px; }
  .logo{ width:120px; height:120px; border-radius:28px; box-shadow:0 16px 34px rgba(0,0,0,.18); }
  .wordmark{ font-family:'Outfit'; font-weight:900; font-size:42px; letter-spacing:10px; color:var(--theme); margin-top:16px; }
  .kick{ margin-top:34px; font-family:'Outfit'; font-weight:800; font-size:40px; color:var(--ink2); letter-spacing:1px; }
  .emoji{ font-size:230px; line-height:1; margin:18px 0; filter:drop-shadow(0 16px 30px rgba(0,0,0,.18)); }
  .h{ font-family:'Outfit'; font-weight:900; font-size:104px; line-height:.92; letter-spacing:-2px; color:var(--theme); }
  .sub{ margin-top:26px; font-size:40px; color:var(--ink); font-weight:600; max-width:820px; line-height:1.4; }
  .sub b{ font-family:'Outfit'; font-weight:900; }
  .cta{ margin-top:54px; font-family:'Outfit'; font-weight:900; font-size:44px; color:#fff;
    background:linear-gradient(90deg, var(--theme), var(--theme2)); padding:22px 56px; border-radius:999px; box-shadow:0 18px 40px rgba(0,0,0,.22); }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:130px; z-index:6;
    background:linear-gradient(90deg, var(--theme2), var(--theme)); display:flex; align-items:center; justify-content:center; gap:30px;
    color:#fff; font-weight:600; font-size:32px; padding-bottom:24px; }
  .strip b{ font-family:'Outfit'; font-weight:800; } .strip .sep{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.5); }
</style></head>
<body><div class="banner"><div class="core">
  <img class="logo" src="icon-512.png" alt="La Base" /><div class="wordmark">LA&nbsp;BASE</div>
  <div class="kick">Aujourd'hui c'est…</div>
  <div class="emoji">🥤</div>
  <div class="h">LA JOURNÉE<br>DU SMOOTHIE</div>
  <div class="sub">Ça tombe bien : c'est <b>notre spécialité</b> 😏 Viens fêter ça avec ton préféré !</div>
  <div class="cta">−10% aujourd'hui 🎉</div>
</div><div class="strip"><span>📍 <b>11 rue Saint Pierre · Verdun</b></span><span class="sep"></span><span>Ton spot healthy</span></div></div></body></html>
