<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>LA BASE — Canicule 3 Energy 0 sucre</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDeep:#115e59; --ice:#e8f6fb; --ice2:#cfeaf3; --sky:#2b8cff; --blue:#0284c7; --amber:#d97706; --amberDeep:#b45309; --ink:#0f2e33; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:
      radial-gradient(820px 820px at 100% 0%, rgba(2,132,199,.26), transparent 60%),
      radial-gradient(760px 760px at 0% 12%, rgba(13,148,136,.20), transparent 62%),
      linear-gradient(180deg,#eef9fe 0%, var(--ice) 48%, var(--ice2) 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:180px 78px 220px; }
  .logo{ width:110px; height:110px; border-radius:26px; box-shadow:0 16px 34px rgba(2,132,199,.30); }
  .wordmark{ font-family:'Outfit'; font-weight:900; font-size:40px; letter-spacing:9px; color:var(--tealDeep); margin-top:14px; }
  .head{ font-family:'Outfit'; font-weight:900; line-height:.9; letter-spacing:-2px; margin-top:26px; }
  .head .a{ font-size:108px; color:var(--blue); }
  .head .b{ font-size:76px; color:var(--ink); }
  .pill{ margin-top:24px; display:inline-flex; align-items:center; gap:12px; padding:16px 40px; border-radius:999px;
    background:rgba(2,132,199,.10); border:2px solid rgba(2,132,199,.30); color:var(--blue); font-weight:800; font-size:36px; }
  .med{ width:440px; height:440px; border-radius:50%; overflow:hidden; border:9px solid #fff; margin-top:46px;
    box-shadow:0 26px 56px rgba(20,40,36,.26); outline:6px solid rgba(2,132,199,.32); }
  .med img{ width:100%; height:100%; object-fit:cover; }
  .facts{ margin-top:48px; display:flex; flex-wrap:wrap; gap:16px; justify-content:center; max-width:820px; }
  .f{ font-family:'Outfit'; font-weight:700; font-size:32px; color:var(--tealDeep);
    background:rgba(13,148,136,.10); border:1.5px solid rgba(13,148,136,.26); border-radius:999px; padding:14px 30px; }
  .saveurs{ margin-top:42px; font-size:36px; color:#41545a; font-weight:500; max-width:840px; line-height:1.4; }
  .saveurs b{ color:var(--ink); font-family:'Outfit'; font-weight:800; }
  .price{ margin-top:30px; font-family:'Outfit'; font-weight:900; font-size:46px; color:var(--amberDeep); }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:140px; z-index:6;
    background:linear-gradient(90deg,var(--tealDeep),var(--teal) 50%,var(--blue));
    display:flex; align-items:center; justify-content:center; gap:24px; color:#eafaf6; font-weight:700; font-size:38px; padding-bottom:24px; }
  .strip b{ font-family:'Outfit'; font-weight:900; color:#fff; }
</style>
</head>
<body>
  <div class="banner">
    <div class="core">
      <img class="logo" src="icon-512.png" alt="La Base" />
      <div class="wordmark">LA&nbsp;BASE</div>
      <div class="head"><div class="a">100% ÉNERGIE</div><div class="b">0 sucre · bien glacée 🧊</div></div>
      <div class="pill">⚡ le coup de boost frais anti-coup de chaud</div>
      <div class="med"><img src="images/drinks/electric-blue.png" alt=""></div>
      <div class="facts">
        <span class="f">0 sucre · 20 cal</span>
        <span class="f">vitamines B &amp; C</span>
        <span class="f">ginseng &amp; guarana</span>
        <span class="f">aloé vera</span>
      </div>
      <div class="saveurs">+16 parfums givrés : <b>Electric Blue · Aurora · Phénix · Black Panther…</b></div>
    </div>
    <div class="strip"><span>🧊 <b>Servies bien fraîches</b> · à emporter à Verdun</span></div>
  </div>
</body>
</html>
