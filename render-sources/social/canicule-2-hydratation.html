<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>LA BASE — Canicule 2 Hydratation</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --teal:#0d9488; --tealDeep:#115e59; --ice:#e8f6fb; --ice2:#cfeaf3; --sky:#2b8cff; --amber:#f6921e; --ink:#0f2e33; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; }
  body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .banner{ width:1080px; height:1920px; position:relative; overflow:hidden;
    background:
      radial-gradient(800px 800px at 0% 0%, rgba(43,140,255,.22), transparent 60%),
      radial-gradient(760px 760px at 100% 8%, rgba(13,148,136,.20), transparent 62%),
      linear-gradient(180deg,#f2fbfe 0%, var(--ice) 45%, var(--ice2) 100%); }
  .banner::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(17,94,89,.05) 1.4px, transparent 1.4px); background-size:30px 30px; opacity:.5; }
  .core{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:180px 78px 220px; }
  .logo{ width:110px; height:110px; border-radius:26px; box-shadow:0 16px 34px rgba(13,148,136,.28); }
  .wordmark{ font-family:'Outfit'; font-weight:900; font-size:40px; letter-spacing:9px; color:var(--tealDeep); margin-top:14px; }
  .kicker{ margin-top:30px; font-family:'Outfit'; font-weight:800; font-size:40px; color:var(--sky); letter-spacing:2px; }
  .head{ font-family:'Outfit'; font-weight:900; line-height:.94; letter-spacing:-2px; margin-top:12px; font-size:92px; color:var(--ink); }
  .head b{ color:var(--teal); }
  .meds{ margin-top:48px; display:flex; gap:40px; justify-content:center; }
  .med{ width:330px; height:330px; border-radius:50%; overflow:hidden; border:8px solid #fff;
    box-shadow:0 24px 50px rgba(20,40,36,.22); outline:5px solid rgba(43,140,255,.30); }
  .med img{ width:100%; height:100%; object-fit:cover; }
  .tips{ margin-top:58px; display:flex; flex-direction:column; gap:24px; width:880px; }
  .tip{ display:flex; align-items:center; gap:26px; text-align:left; background:rgba(255,255,255,.72); border:2px solid rgba(13,148,136,.20);
    border-radius:28px; padding:28px 36px; box-shadow:0 12px 28px rgba(20,40,36,.08); }
  .tip .ic{ font-size:62px; line-height:1; }
  .tip .tx{ font-size:38px; font-weight:600; color:var(--ink); line-height:1.25; }
  .tip .tx b{ font-family:'Outfit'; font-weight:900; color:var(--tealDeep); }
  .strip{ position:absolute; left:0; right:0; bottom:0; height:140px; z-index:6;
    background:linear-gradient(90deg,var(--tealDeep),var(--teal) 55%,var(--sky));
    display:flex; align-items:center; justify-content:center; gap:24px; color:#eafaf6; font-weight:700; font-size:38px; padding-bottom:24px; }
  .strip b{ font-family:'Outfit'; font-weight:900; color:#fff; }
</style>
</head>
<body>
  <div class="banner">
    <div class="core">
      <img class="logo" src="icon-512.png" alt="La Base" />
      <div class="wordmark">LA&nbsp;BASE</div>
      <div class="kicker">💧 LE RÉFLEXE VITAL</div>
      <div class="head">Bien boire,<br><b>c'est tenir le coup</b></div>
      <div class="meds">
        <div class="med"><img src="images/sante/hydrat-max.png" alt=""></div>
        <div class="med"><img src="images/sport/electro-lyte.png" alt=""></div>
      </div>
      <div class="tips">
        <div class="tip"><span class="ic">🥤</span><span class="tx"><b>Bois avant d'avoir soif</b> — petites gorgées toute la journée</span></div>
        <div class="tip"><span class="ic">🧂</span><span class="tx">Tu transpires = tu perds des <b>minéraux</b>. Recharge avec des <b>électrolytes</b></span></div>
        <div class="tip"><span class="ic">🧊</span><span class="tx">Frais &amp; <b>0 sucre</b> : on s'hydrate sans alourdir</span></div>
      </div>
    </div>
    <div class="strip"><span>📍 <b>La Base</b> · Verdun &nbsp;·&nbsp; ta pause fraîcheur 💙</span></div>
  </div>
</body>
</html>
